<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>DANTE LABS — Earth vs Moon Gravity Lab</title>
  <style>
    :root {
      --ink: #f4f7ff;
      --muted: #9da8bd;
      --line: rgba(255,255,255,.16);
      --glass: rgba(10,14,24,.68);
      --earth: #69b7ff;
      --moon: #f1dfb5;
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #05070d; color: var(--ink); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    canvas { position: fixed; inset: 0; display: block; }
    .grain { position: fixed; inset: 0; pointer-events: none; z-index: 2; opacity: .22; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.12'/%3E%3C/svg%3E"); }
    header { position: fixed; z-index: 4; top: 0; left: 0; right: 0; height: 88px; display: flex; align-items: center; justify-content: space-between; padding: 0 clamp(18px, 3vw, 48px); border-bottom: 1px solid var(--line); background: linear-gradient(180deg, rgba(4,6,11,.88), rgba(4,6,11,.35)); backdrop-filter: blur(14px); }
    .brand { display: flex; align-items: center; gap: 13px; letter-spacing: .18em; font-size: 13px; font-weight: 750; }
    .brand-mark { width: 30px; height: 30px; border: 1px solid rgba(255,255,255,.7); border-radius: 50%; position: relative; }
    .brand-mark::before, .brand-mark::after { content: ""; position: absolute; inset: 6px; border: 1px solid rgba(255,255,255,.35); border-radius: 50%; }
    .brand-mark::after { inset: 13px -4px; border-radius: 0; border-width: 1px 0 0; transform: rotate(-18deg); }
    .eyebrow { color: var(--muted); font: 600 10px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .18em; text-transform: uppercase; }
    .header-title { margin-top: 2px; font-size: clamp(14px, 1.5vw, 20px); font-weight: 500; letter-spacing: -.02em; }
    .panel-labels { position: fixed; z-index: 3; top: 111px; left: 0; right: 0; display: grid; grid-template-columns: 1fr 1fr; pointer-events: none; }
    .panel-label { padding: 0 clamp(18px, 3vw, 48px); }
    .panel-label + .panel-label { border-left: 1px solid var(--line); }
    .world-name { display: flex; align-items: center; gap: 11px; font-size: clamp(26px, 4vw, 52px); line-height: 1; letter-spacing: -.055em; font-weight: 620; }
    .world-index { font: 500 10px/1 ui-monospace, monospace; color: var(--muted); letter-spacing: .1em; }
    .world-meta { margin-top: 10px; color: var(--muted); font: 500 11px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .08em; }
    .earth .world-name { color: #d8edff; } .moon .world-name { color: #fff2d2; }
    .divider { position: fixed; z-index: 3; top: 88px; bottom: 0; left: 50%; width: 1px; background: var(--line); pointer-events: none; }
    .hud-grid { position: fixed; z-index: 4; left: 0; right: 0; bottom: 112px; display: grid; grid-template-columns: 1fr 1fr; pointer-events: none; }
    .hud { margin: 0 clamp(16px, 2.8vw, 44px); padding: 12px 14px; width: min(245px, calc(100% - 32px)); border: 1px solid var(--line); background: var(--glass); backdrop-filter: blur(12px); box-shadow: 0 12px 40px rgba(0,0,0,.25); }
    .moon-hud { justify-self: end; }
    .hud-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; }
    .status { display: flex; align-items: center; gap: 7px; font: 650 10px/1 ui-monospace, monospace; letter-spacing: .14em; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #6dffb2; box-shadow: 0 0 12px #6dffb2; }
    .readout { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .metric span { display: block; color: var(--muted); font: 500 9px/1.4 ui-monospace, monospace; letter-spacing: .11em; text-transform: uppercase; }
    .metric strong { display: block; margin-top: 2px; font: 500 clamp(12px, 1.15vw, 15px)/1.2 ui-monospace, monospace; white-space: nowrap; }
    footer { position: fixed; z-index: 5; left: 0; right: 0; bottom: 0; height: 88px; display: flex; align-items: center; justify-content: center; gap: 12px; border-top: 1px solid var(--line); background: rgba(5,7,13,.86); backdrop-filter: blur(16px); }
    button { appearance: none; border: 0; font: 700 12px/1 ui-monospace, monospace; letter-spacing: .11em; cursor: pointer; transition: transform .15s ease, background .15s ease, opacity .15s ease; }
    button:active { transform: translateY(1px); }
    #jumpBtn { min-width: 210px; height: 48px; padding: 0 25px; color: #07111b; background: #f4f7ff; clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px); }
    #jumpBtn:hover { background: #cce8ff; }
    #jumpBtn:disabled { opacity: .45; cursor: not-allowed; }
    .icon-btn { width: 48px; height: 48px; color: var(--ink); border: 1px solid var(--line); background: rgba(255,255,255,.04); }
    .icon-btn:hover { background: rgba(255,255,255,.1); }
    .hint { position: absolute; right: clamp(18px, 3vw, 48px); color: var(--muted); font: 500 9px/1.5 ui-monospace, monospace; letter-spacing: .1em; text-align: right; }
    #loading { position: fixed; z-index: 10; inset: 0; display: grid; place-items: center; background: #05070d; transition: opacity .5s ease; }
    .loader-inner { width: min(320px, 70vw); text-align: center; }
    .loader-title { font: 650 12px/1.5 ui-monospace, monospace; letter-spacing: .2em; }
    .loader-track { height: 1px; margin-top: 18px; background: rgba(255,255,255,.14); overflow: hidden; }
    .loader-bar { width: 40%; height: 100%; background: white; animation: scan 1.1s ease-in-out infinite alternate; }
    @keyframes scan { to { transform: translateX(150%); } }
    @media (max-width: 720px) {
      header { height: 72px; }
      .header-title, .hint { display: none; }
      .panel-labels { top: 91px; }
      .panel-label { padding: 0 14px; }
      .world-name { font-size: 27px; }
      .world-meta { font-size: 9px; }
      .hud-grid { bottom: 92px; }
      .hud { margin: 0 8px; padding: 9px; }
      .readout { grid-template-columns: 1fr; gap: 3px; }
      .metric { display: flex; justify-content: space-between; }
      .metric strong { font-size: 12px; }
      footer { height: 72px; }
      #jumpBtn { height: 44px; min-width: 170px; }
      .icon-btn { width: 44px; height: 44px; }
      .divider { top: 72px; }
    }
  </style>
</head>
<body>
  <div id="loading"><div class="loader-inner"><div class="loader-title">DANTE LABS / LOADING MISSION</div><div class="loader-track"><div class="loader-bar"></div></div></div></div>
  <div class="grain"></div>
  <header>
    <div class="brand"><span class="brand-mark" aria-hidden="true"></span><span>DANTE LABS</span></div>
    <div><div class="eyebrow">GRAVITY EXPERIMENT 04</div><div class="header-title">같은 도약, 다른 중력</div></div>
    <div class="eyebrow" id="fps">SIM / READY</div>
  </header>
  <div class="panel-labels">
    <section class="panel-label earth"><div class="world-name"><span class="world-index">01</span>EARTH</div><div class="world-meta">g = 9.81 m/s² · 1.00 G</div></section>
    <section class="panel-label moon"><div class="world-name"><span class="world-index">02</span>MOON</div><div class="world-meta">g = 1.62 m/s² · 0.165 G</div></section>
  </div>
  <div class="divider"></div>
  <div class="hud-grid">
    <div class="hud earth-hud">
      <div class="hud-top"><span class="eyebrow">LIVE TELEMETRY</span><span class="status"><i class="dot"></i><span id="earthStatus">LANDED</span></span></div>
      <div class="readout"><div class="metric"><span>HEIGHT</span><strong id="earthHeight">0.00 m</strong></div><div class="metric"><span>VELOCITY</span><strong id="earthVelocity">0.00 m/s</strong></div><div class="metric"><span>APEX</span><strong id="earthApex">—</strong></div></div>
    </div>
    <div class="hud moon-hud">
      <div class="hud-top"><span class="eyebrow">LIVE TELEMETRY</span><span class="status"><i class="dot"></i><span id="moonStatus">LANDED</span></span></div>
      <div class="readout"><div class="metric"><span>HEIGHT</span><strong id="moonHeight">0.00 m</strong></div><div class="metric"><span>VELOCITY</span><strong id="moonVelocity">0.00 m/s</strong></div><div class="metric"><span>APEX</span><strong id="moonApex">—</strong></div></div>
    </div>
  </div>
  <footer>
    <button id="resetBtn" class="icon-btn" title="초기화 (R)" aria-label="초기화">↺</button>
    <button id="jumpBtn" disabled>동시에 점프 / SPACE</button>
    <button id="pauseBtn" class="icon-btn" title="일시 정지 (P)" aria-label="일시 정지">Ⅱ</button>
    <div class="hint">SPACE : JUMP<br>R : RESET · P : PAUSE</div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
  <script>
  (() => {
    'use strict';

    const ASSET_ROOT = 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/';
    const MODEL_URL = 'https://modelviewer.dev/shared-assets/models/Astronaut.glb';
    const INITIAL_VELOCITY = 5.0; // m/s: identical impulse in both worlds
    const FIXED_DT = 1 / 120;
    const MAX_FRAME_DT = 0.05;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.autoClear = false;
    document.body.prepend(renderer.domElement);

    const textureLoader = new THREE.TextureLoader();
    textureLoader.setCrossOrigin('anonymous');

    function makeWorld(config) {
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(config.background);
      scene.fog = new THREE.FogExp2(config.fog, config.fogDensity);

      const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
      camera.position.set(0, 4.8, 15);
      camera.lookAt(0, 4.4, 0);

      scene.add(new THREE.HemisphereLight(config.skyLight, config.groundLight, config.hemiIntensity));
      const key = new THREE.DirectionalLight(config.keyLight, config.keyIntensity);
      key.position.set(config.keyX, 10, 7);
      key.castShadow = true;
      key.shadow.mapSize.set(1024, 1024);
      key.shadow.camera.left = -7; key.shadow.camera.right = 7;
      key.shadow.camera.top = 12; key.shadow.camera.bottom = -2;
      scene.add(key);

      const fill = new THREE.PointLight(config.fillLight, config.fillIntensity, 24);
      fill.position.set(-5, 4, 6);
      scene.add(fill);

      const groundTexture = textureLoader.load(config.groundTexture);
      groundTexture.wrapS = groundTexture.wrapT = THREE.RepeatWrapping;
      groundTexture.repeat.set(5, 5);
      groundTexture.encoding = THREE.sRGBEncoding;
      const ground = new THREE.Mesh(
        new THREE.CircleGeometry(16, 80),
        new THREE.MeshStandardMaterial({ map: groundTexture, color: config.groundColor, roughness: 1, metalness: 0 })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);

      const rings = new THREE.Group();
      [3.4, 6.4, 10.2].forEach((r, i) => {
        const ring = new THREE.Mesh(
          new THREE.RingGeometry(r, r + 0.015, 96),
          new THREE.MeshBasicMaterial({ color: config.ringColor, transparent: true, opacity: .13 - i * .025, side: THREE.DoubleSide })
        );
        ring.rotation.x = -Math.PI / 2; ring.position.y = .008;
        rings.add(ring);
      });
      scene.add(rings);

      const planetTexture = textureLoader.load(config.planetTexture);
      planetTexture.encoding = THREE.sRGBEncoding;
      const planet = new THREE.Mesh(new THREE.SphereGeometry(2.5, 48, 32), new THREE.MeshBasicMaterial({ map: planetTexture }));
      planet.position.set(config.planetX, 8.2, -8);
      planet.scale.setScalar(config.planetScale);
      scene.add(planet);

      if (config.atmosphere) {
        const glow = new THREE.Mesh(new THREE.SphereGeometry(2.56, 48, 32), new THREE.MeshBasicMaterial({ color: 0x52aaff, transparent: true, opacity: .11, side: THREE.BackSide }));
        glow.position.copy(planet.position); glow.scale.copy(planet.scale).multiplyScalar(1.04); scene.add(glow);
      }

      const stars = new THREE.BufferGeometry();
      const points = [];
      for (let i = 0; i < 420; i++) points.push((Math.random() - .5) * 42, Math.random() * 20 + 1, -Math.random() * 24 - 6);
      stars.setAttribute('position', new THREE.Float32BufferAttribute(points, 3));
      scene.add(new THREE.Points(stars, new THREE.PointsMaterial({ color: config.starColor, size: .025, transparent: true, opacity: config.starOpacity })));

      const astronautRoot = new THREE.Group();
      scene.add(astronautRoot);
      const sim = {
        name: config.name, gravity: config.gravity, scene, camera, planet, astronautRoot,
        y: 0, velocity: 0, elapsed: 0, apex: 0, apexTime: 0, fallStartTime: null,
        state: 'landed', dust: [], dom: {
          height: document.getElementById(config.id + 'Height'),
          velocity: document.getElementById(config.id + 'Velocity'),
          apex: document.getElementById(config.id + 'Apex'),
          status: document.getElementById(config.id + 'Status')
        }, dustColor: config.dustColor
      };
      return sim;
    }

    const earth = makeWorld({
      id: 'earth', name: 'EARTH', gravity: 9.81, background: 0x07131c, fog: 0x07131c, fogDensity: .025,
      skyLight: 0xbde4ff, groundLight: 0x14231a, hemiIntensity: 1.15, keyLight: 0xfff0cf, keyIntensity: 2.1,
      keyX: -5, fillLight: 0x318fff, fillIntensity: 1.0, groundTexture: ASSET_ROOT + 'terrain/grasslight-big.jpg',
      groundColor: 0x416344, ringColor: 0xa8d7ff, planetTexture: ASSET_ROOT + 'planets/earth_atmos_2048.jpg',
      planetX: -7.3, planetScale: 1.2, atmosphere: true, starColor: 0xb8dcff, starOpacity: .6, dustColor: 0xb7d3a4
    });
    const moon = makeWorld({
      id: 'moon', name: 'MOON', gravity: 1.62, background: 0x0b0b10, fog: 0x0b0b10, fogDensity: .018,
      skyLight: 0xe8edff, groundLight: 0x111116, hemiIntensity: .55, keyLight: 0xfff4dc, keyIntensity: 2.6,
      keyX: 5, fillLight: 0x6982ff, fillIntensity: .35, groundTexture: ASSET_ROOT + 'planets/moon_1024.jpg',
      groundColor: 0xb2ada5, ringColor: 0xffe9bd, planetTexture: ASSET_ROOT + 'planets/moon_1024.jpg',
      planetX: 7.3, planetScale: 1.1, atmosphere: false, starColor: 0xffffff, starOpacity: .9, dustColor: 0xd8d0bf
    });
    const worlds = [earth, moon];

    function makeFallbackAstronaut() {
      const group = new THREE.Group();
      const suit = new THREE.MeshStandardMaterial({ color: 0xe9edf1, roughness: .65 });
      const dark = new THREE.MeshStandardMaterial({ color: 0x222936, roughness: .4, metalness: .2 });
      const visor = new THREE.MeshStandardMaterial({ color: 0x19304d, roughness: .2, metalness: .75 });
      const body = new THREE.Mesh(new THREE.CylinderGeometry(.27, .34, .78, 12), suit); body.position.y = 1.05; group.add(body);
      const helmet = new THREE.Mesh(new THREE.SphereGeometry(.36, 24, 16), suit); helmet.position.y = 1.63; group.add(helmet);
      const face = new THREE.Mesh(new THREE.SphereGeometry(.29, 24, 16, -.95, 1.9, .25, 1.7), visor); face.position.set(0, 1.63, .09); group.add(face);
      [-1, 1].forEach(side => {
        const arm = new THREE.Mesh(new THREE.CylinderGeometry(.09, .11, .58, 8), suit); arm.position.set(side * .39, 1.05, 0); arm.rotation.z = side * .15; group.add(arm);
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(.115, .135, .68, 8), suit); leg.position.set(side * .16, .39, 0); group.add(leg);
        const boot = new THREE.Mesh(new THREE.BoxGeometry(.27, .16, .39), dark); boot.position.set(side * .16, .08, .08); group.add(boot);
      });
      group.traverse(o => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
      return group;
    }

    function normalizeModel(model) {
      model.updateMatrixWorld(true);
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      if (!Number.isFinite(size.y) || size.y <= 0) return makeFallbackAstronaut();
      // Slight exhibit-scale enlargement keeps the subject readable in the full 7.7 m lunar arc.
      const scale = 2.35 / size.y;
      model.scale.setScalar(scale);
      model.updateMatrixWorld(true);
      const scaledBox = new THREE.Box3().setFromObject(model);
      const center = scaledBox.getCenter(new THREE.Vector3());
      model.position.x -= center.x;
      model.position.z -= center.z;
      model.position.y -= scaledBox.min.y;
      model.rotation.y = Math.PI;
      model.traverse(o => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
      return model;
    }

    function attachModel(world, model) {
      world.astronautRoot.clear();
      world.astronautRoot.add(normalizeModel(model));
    }

    function finishLoading() {
      document.getElementById('jumpBtn').disabled = false;
      const loading = document.getElementById('loading');
      loading.style.opacity = '0';
      setTimeout(() => loading.remove(), 520);
    }

    const loader = new THREE.GLTFLoader();
    loader.load(MODEL_URL, gltf => {
      attachModel(earth, gltf.scene);
      // Reloading provides a fully independent skinned hierarchy for the second simulation.
      loader.load(MODEL_URL, second => { attachModel(moon, second.scene); finishLoading(); }, undefined, () => {
        attachModel(moon, makeFallbackAstronaut()); finishLoading();
      });
    }, undefined, error => {
      console.warn('Astronaut GLB unavailable; using procedural fallback.', error);
      attachModel(earth, makeFallbackAstronaut());
      attachModel(moon, makeFallbackAstronaut());
      finishLoading();
    });

    function spawnDust(world) {
      const group = new THREE.Group();
      const particles = [];
      for (let i = 0; i < 26; i++) {
        const angle = (i / 26) * Math.PI * 2 + Math.random() * .22;
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(.025 + Math.random() * .035, 6, 5),
          new THREE.MeshBasicMaterial({ color: world.dustColor, transparent: true, opacity: .7 })
        );
        mesh.position.set(0, .03, 0);
        group.add(mesh);
        particles.push({ mesh, vx: Math.cos(angle) * (.7 + Math.random() * 1.25), vy: .25 + Math.random() * .65, vz: Math.sin(angle) * (.7 + Math.random() * 1.25) });
      }
      world.scene.add(group);
      world.dust.push({ group, particles, age: 0 });
    }

    function updateDust(world, dt) {
      for (let d = world.dust.length - 1; d >= 0; d--) {
        const burst = world.dust[d]; burst.age += dt;
        burst.particles.forEach(p => {
          p.mesh.position.x += p.vx * dt; p.mesh.position.z += p.vz * dt;
          p.vy -= world.gravity * .16 * dt; p.mesh.position.y = Math.max(.02, p.mesh.position.y + p.vy * dt);
          p.mesh.material.opacity = Math.max(0, .72 * (1 - burst.age / 1.15));
        });
        if (burst.age >= 1.15) { world.scene.remove(burst.group); burst.group.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) o.material.dispose(); }); world.dust.splice(d, 1); }
      }
    }

    function jump() {
      if (paused || worlds.some(w => w.state !== 'landed')) return;
      worlds.forEach(w => {
        w.y = 0; w.velocity = INITIAL_VELOCITY; w.elapsed = 0; w.apex = 0; w.apexTime = 0; w.fallStartTime = null; w.state = 'rising';
        w.dom.status.textContent = 'ASCENDING'; w.dom.apex.textContent = '—';
      });
      document.getElementById('jumpBtn').disabled = true;
    }

    function reset() {
      worlds.forEach(w => {
        w.y = 0; w.velocity = 0; w.elapsed = 0; w.apex = 0; w.apexTime = 0; w.fallStartTime = null; w.state = 'landed';
        w.astronautRoot.position.y = 0; w.dom.status.textContent = 'LANDED'; w.dom.apex.textContent = '—';
        w.dust.forEach(d => w.scene.remove(d.group)); w.dust = [];
      });
      paused = false; document.getElementById('pauseBtn').textContent = 'Ⅱ'; document.getElementById('jumpBtn').disabled = false;
      updateTelemetry();
    }

    function togglePause() {
      paused = !paused;
      document.getElementById('pauseBtn').textContent = paused ? '▶' : 'Ⅱ';
      worlds.forEach(w => { if (w.state !== 'landed') w.dom.status.textContent = paused ? 'PAUSED' : (w.velocity > 0 ? 'ASCENDING' : 'DESCENDING'); });
    }

    function stepWorld(w, dt) {
      updateDust(w, dt);
      if (w.state === 'landed') return;
      const previousVelocity = w.velocity;
      w.elapsed += dt;
      w.velocity -= w.gravity * dt;
      w.y += w.velocity * dt;

      if (w.state === 'rising' && previousVelocity > 0 && w.velocity <= 0) {
        // Exact ballistic apex, independent of integration discretization.
        w.apex = (INITIAL_VELOCITY * INITIAL_VELOCITY) / (2 * w.gravity);
        w.y = Math.min(w.y, w.apex);
        w.apexTime = INITIAL_VELOCITY / w.gravity;
        w.fallStartTime = w.elapsed;
        w.state = 'falling'; w.dom.status.textContent = 'DESCENDING';
        w.dom.apex.textContent = w.apex.toFixed(2) + ' m';
        console.log('[' + w.name + '] jump_apex_m=' + w.apex.toFixed(3));
      }

      if (w.y <= 0 && w.velocity < 0) {
        const exactFallTime = Math.sqrt((2 * w.apex) / w.gravity);
        w.y = 0; w.velocity = 0; w.state = 'landed'; w.dom.status.textContent = 'LANDED';
        console.log('[' + w.name + '] fall_time_s=' + exactFallTime.toFixed(3));
        console.log('[' + w.name + '] landed');
        spawnDust(w);
        if (worlds.every(world => world.state === 'landed')) document.getElementById('jumpBtn').disabled = false;
      }
      w.astronautRoot.position.y = w.y;
    }

    function updateTelemetry() {
      worlds.forEach(w => {
        w.dom.height.textContent = w.y.toFixed(2) + ' m';
        w.dom.velocity.textContent = (Math.abs(w.velocity) < .005 ? 0 : w.velocity).toFixed(2) + ' m/s';
      });
    }

    function render() {
      const width = window.innerWidth, height = window.innerHeight;
      const half = Math.floor(width / 2);
      renderer.setScissorTest(true);
      worlds.forEach((w, index) => {
        const x = index === 0 ? 0 : half;
        const paneWidth = index === 0 ? half : width - half;
        renderer.setViewport(x, 0, paneWidth, height);
        renderer.setScissor(x, 0, paneWidth, height);
        w.camera.aspect = paneWidth / height; w.camera.updateProjectionMatrix();
        renderer.render(w.scene, w.camera);
      });
      renderer.setScissorTest(false);
    }

    let paused = false, accumulator = 0, last = performance.now(), fpsFrames = 0, fpsElapsed = 0;
    function animate(now) {
      requestAnimationFrame(animate);
      const rawDt = Math.min((now - last) / 1000, MAX_FRAME_DT); last = now;
      if (!paused) {
        accumulator += rawDt;
        while (accumulator >= FIXED_DT) { worlds.forEach(w => stepWorld(w, FIXED_DT)); accumulator -= FIXED_DT; }
        worlds.forEach(w => { w.planet.rotation.y += rawDt * .035; });
      }
      updateTelemetry(); render();
      fpsFrames++; fpsElapsed += rawDt;
      if (fpsElapsed >= .5) { document.getElementById('fps').textContent = 'SIM / ' + Math.round(fpsFrames / fpsElapsed) + ' FPS'; fpsFrames = 0; fpsElapsed = 0; }
    }

    document.getElementById('jumpBtn').addEventListener('click', jump);
    document.getElementById('resetBtn').addEventListener('click', reset);
    document.getElementById('pauseBtn').addEventListener('click', togglePause);
    window.addEventListener('keydown', e => {
      if (e.code === 'Space') { e.preventDefault(); jump(); }
      if (e.key.toLowerCase() === 'r') reset();
      if (e.key.toLowerCase() === 'p') togglePause();
    });
    window.addEventListener('resize', () => { renderer.setSize(window.innerWidth, window.innerHeight); renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); });
    requestAnimationFrame(animate);
  })();
  </script>
</body>
</html>
