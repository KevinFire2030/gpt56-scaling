['서해선',2018,'#8FC31F',[[95,1210],[175,1150],[255,1080],[335,1015]],['원시','시흥시청','초지','소사']],

const c=document.getElementById('c'),x=c.getContext('2d'),yearEl=document.getElementById('year'),bar=document.getElementById('bar'),count=document.getElementById('count'),cap=document.getElementById('caption');
const start=1974,end=2026,duration=15000;
function mix(a,b,p){return a+(b-a)*p}function pointOn(p,t){let n=p.length-1,u=t*n,i=Math.min(n-1,Math.floor(u)),f=u-i;return [mix(p[i][0],p[i+1][0],f),mix(p[i][1],p[i+1][1],f)]}
function path(pts,cut=1){x.beginPath();let max=Math.max(0,Math.min(1,cut))*(pts.length-1);pts.forEach((p,i)=>{if(i>Math.ceil(max))return;let q=p;if(i===Math.ceil(max)&&i>0){let prev=pts[i-1],f=max-(i-1);q=[mix(prev[0],p[0],f),mix(prev[1],p[1],f)]}i?x.lineTo(...q):x.moveTo(...q)});x.stroke()}
function node(p,r,color,transfer){x.beginPath();x.arc(p[0],p[1],r,0,Math.PI*2);x.fillStyle=transfer?'#f5fbff':color;x.fill();x.lineWidth=transfer?5:3;x.strokeStyle=transfer?'#0d2945':'#dff4ff';x.stroke()}
function stationLabel(p,text,color){x.save();x.font='700 15px Arial, Malgun Gothic, sans-serif';x.textBaseline='middle';let w=x.measureText(text).width+20, px=p[0]+13,py=p[1]-26;x.fillStyle='#07101ed9';x.strokeStyle=color;x.lineWidth=1.5;x.beginPath();x.roundRect(px,py,w,27,13);x.fill();x.stroke();x.fillStyle='#f5fbff';x.fillText(text,px+10,py+14);x.restore()}
function draw(t){x.clearRect(0,0,1080,1920);x.save();x.translate(0,10); // guide
for(const l of L){x.strokeStyle='#b8d7ed24';x.lineWidth=10;x.lineCap='round';x.lineJoin='round';path(l.pts)}
const yr=Math.min(end,Math.floor(start+(end-start)*Math.min(1,t/duration)));let shown=0;for(const l of L){let local=(t-((l.opened-start)/(2024-start))*13000)/850; if(local<=0)continue;shown++; x.strokeStyle=l.color;x.shadowColor=l.color;x.shadowBlur=13;x.lineWidth=12;x.lineCap='round';x.lineJoin='round';path(l.pts,Math.min(1,local));x.shadowBlur=0;if(local>=1){for(let i=0;i<l.pts.length;i++){let p=l.pts[i],transfer=L.some(o=>o!==l&&o.opened<=l.opened&&o.pts.some(q=>Math.hypot(q[0]-p[0],q[1]-p[1])<35));node(p,transfer?11:6,l.color,transfer)}if(l.id<15)stationLabel(l.pts[0],l.labels[0],l.color)} else {node(pointOn(l.pts,Math.min(1,local)),9,l.color,false)} }
x.restore();yearEl.firstChild.nodeValue=String(yr);bar.style.width=(Math.min(1,t/duration)*100)+'%';count.textContent=shown;let recent=L.filter(l=>l.opened===yr);if(recent.length&&t<14000){cap.textContent=yr+' · '+recent.map(l=>l.name).join(' / ')+' 개통';cap.style.opacity=1}else cap.style.opacity=0;window.__mg={t:Math.min(t,duration),year:yr,lines_shown:shown};}
let base=null,done=false;function frame(now){if(base===null)base=now;let t=Math.min(duration,now-base);draw(t);if(t<duration)requestAnimationFrame(frame);else {done=true;draw(duration)}}window.__mgStep=(ms)=>draw(Math.max(0,Math.min(duration,ms)));if(!new URLSearchParams(location.search).has('manual'))requestAnimationFrame(frame);
</script></body></html>
