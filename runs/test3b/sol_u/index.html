 background();text('SEOUL METROPOLITAN RAIL',54,100,24,'#87a4bc');text('서울 수도권 지하철의 성장',54,158,44,'#f5f8fb');
 text(String(year),540,340,164,'#fff','center');text('개통 연도',540,389,25,'#8fa8bd','center');
 guide();for(const l of LINES){const p=clamp((yFloat-l.year)/1.6);drawLine(l,p)}
 // transfer stations: outer white ring + dark core, only after the second connected line exists
 for(const tr of TRANSFERS){if(year<tr[2])continue;const q=mapPoint(tr[0],tr[1]);x.fillStyle='#07101c';x.strokeStyle='#f6fbff';x.lineWidth=3;x.beginPath();x.arc(q[0],q[1],5.7,0,Math.PI*2);x.fill();x.stroke()}

 for(let i=0;i<LABELS.length;i++){const a=LABELS[i];if(year<a[3])continue;const q=mapPoint(a[1],a[2]),lx=q[0]+a[4],ly=q[1]+a[5];x.strokeStyle='rgba(236,246,252,.5)';x.lineWidth=1.5;x.beginPath();x.moveTo(q[0],q[1]);x.lineTo(lx,ly-12);x.stroke();rr(lx-55,ly-30,110,38,11);x.fillStyle='rgba(5,10,18,.9)';x.fill();text(a[0],lx,ly-4,19,'#f5f8fb','center')}

 rr(42,1470,996,250,28);x.fillStyle='rgba(15,26,42,.94)';x.fill();x.strokeStyle='rgba(150,190,220,.13)';x.lineWidth=2;x.stroke();
 text('현재 연결된 노선',76,1532,25,'#89a6bd');text(`${shown}개`,1000,1532,28,'#fff','right');const visible=LINES.filter(l=>l.year<=year).slice(-8);visible.forEach((l,i)=>{const col=i%2,row=Math.floor(i/2),px=78+col*476,py=1585+row*38;x.fillStyle=l.color;x.beginPath();x.arc(px,py-7,7,0,Math.PI*2);x.fill();text(l.name,px+18,py,20,'#dce6ee');text(String(l.year),px+430,py,18,'#7892a8','right')});

 text('1974',52,1790,23,'#8ba4b8');text('2026',1028,1790,23,'#8ba4b8','right');x.fillStyle='rgba(255,255,255,.12)';rr(52,1815,976,10,5);x.fill();const pg=x.createLinearGradient(52,0,1028,0);pg.addColorStop(0,'#005DAA');pg.addColorStop(.48,'#00A44A');pg.addColorStop(1,'#9A6292');x.fillStyle=pg;rr(52,1815,976*frac,10,5);x.fill();x.fillStyle='#fff';x.beginPath();x.arc(52+976*frac,1820,8,0,Math.PI*2);x.fill();
 text(done?'완성된 네트워크':'도시를 잇는 선들이 자랍니다',540,1882,23,done?'#d9c7e6':'#7893a9','center');window.__mg={t:Math.min(ms/1000,15),year,lines_shown:shown};}
let origin=null;function tick(now){if(origin===null)origin=now;const ms=Math.min(now-origin,END_MS);render(ms);if(ms<END_MS)requestAnimationFrame(tick)}
