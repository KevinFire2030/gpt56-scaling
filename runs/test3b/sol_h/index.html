function text(s,x,y,size,weight=500,color='#fff',align='left'){g.font=`${weight} ${size}px MGNoto,sans-serif`;g.fillStyle=color;g.textAlign=align;g.textBaseline='alphabetic';g.fillText(s,x,y)}
function draw(t){
 const revealEnd=13.7,year=1974+(2026-1974)*clamp(t/revealEnd),iy=Math.min(2026,Math.floor(year));
 g.clearRect(0,0,W,H);let grd=g.createLinearGradient(0,0,0,H);grd.addColorStop(0,'#07152B');grd.addColorStop(.55,'#050B18');grd.addColorStop(1,'#030711');g.fillStyle=grd;g.fillRect(0,0,W,H);
 // 미세한 도시 격자
 g.strokeStyle='rgba(116,161,196,.055)';g.lineWidth=1;for(let x=42;x<1040;x+=62){g.beginPath();g.moveTo(x,390);g.lineTo(x,1510);g.stroke()}for(let y=420;y<1510;y+=62){g.beginPath();g.moveTo(35,y);g.lineTo(1045,y);g.stroke()}
 text('SEOUL · METROPOLITAN RAIL',54,76,22,650,'#7EC8FF');text('도시를 잇는 52년',54,139,52,760,'#F5F8FF');text('1974 — 2026',54,180,22,500,'#7D8EA8');
 text(String(iy),1026,229,126,800,'#F7FAFF','right');text('진행 연도',1024,268,21,520,'#8EA1BA','right');
 // 한강의 흐린 지리 가이드
 g.save();g.strokeStyle='rgba(56,154,218,.13)';g.lineWidth=36;g.lineCap='round';path([[126.7,37.55],[126.86,37.535],[126.98,37.535],[127.1,37.54],[127.25,37.57]],1);g.restore();
 // 완성 노선망 가이드 — 첫 프레임부터 전부 존재
 g.save();g.lineCap='round';g.lineJoin='round';g.strokeStyle='rgba(174,199,219,.105)';g.lineWidth=5;for(const l of D.lines)for(const p of l.paths)path(p,1);g.restore();
 let shown=0,latest=null;const progressBy={};
 for(const l of D.lines){let st=(l.year-1974)/(2026-1974)*revealEnd,pr=ease((t-st)/.60);progressBy[l.id]=pr;if(pr>0){shown++;if(!latest||l.year>=latest.year)latest=l}if(pr<=0)continue;g.save();g.globalAlpha=.96;g.strokeStyle=l.color;g.lineWidth=l.id==='GTXA'?10:7;g.lineCap='round';g.lineJoin='round';g.shadowColor=l.color;g.shadowBlur=pr<1?17:6;for(const p of l.paths)path(p,pr);g.restore()}
 // 역: 개통된 노선의 정차점, 환승역은 이중 링
 for(const s of D.stations){let vis=s.l.some(id=>progressBy[id]>.82);if(!vis)continue;let[x,y]=P(s.x,s.y);if(x<30||x>1050||y<390||y>1510)continue;g.beginPath();g.arc(x,y,s.tr?6.8:2.5,0,Math.PI*2);g.fillStyle=s.tr?'#07111F':'rgba(236,246,255,.86)';g.fill();if(s.tr){g.strokeStyle='#F7FBFF';g.lineWidth=2.2;g.stroke();g.beginPath();g.arc(x,y,10.5,0,Math.PI*2);g.strokeStyle='rgba(247,251,255,.34)';g.lineWidth=1;g.stroke()}}
 // 주요 역 라벨은 해당 역의 실제 최초 도시철도 개통연도에 등장
 for(const a of D.labels){let q=ease((year-a.year)/1.6);if(q<=0)continue;let[x,y]=P(a.x,a.y),lx=x+a.dx,ly=y+a.dy;g.globalAlpha=q;g.strokeStyle='rgba(235,246,255,.46)';g.lineWidth=1.5;g.beginPath();g.moveTo(x,y);g.lineTo(lx+(a.dx<0?7:-7),ly-6);g.stroke();g.beginPath();g.arc(x,y,5,0,7);g.fillStyle='#fff';g.fill();g.shadowColor='#020711';g.shadowBlur=8;text(a.n,lx,ly,18,650,'#EAF2FB',a.dx<0?'right':'left');g.shadowBlur=0;g.globalAlpha=1}
 // 연도 진행선
 const tx=55,ty=1570,tw=970;g.fillStyle='rgba(255,255,255,.10)';g.fillRect(tx,ty,tw,3);g.fillStyle='#5CC8FF';g.fillRect(tx,ty,tw*clamp(t/revealEnd),3);g.beginPath();g.arc(tx+tw*clamp(t/revealEnd),ty+1.5,8,0,7);g.fillStyle='#E9F8FF';g.fill();
 text('1974',tx,1615,19,550,'#73859E');text('1985',tx+tw*.215,1615,19,550,'#73859E','center');text('2000',tx+tw*.50,1615,19,550,'#73859E','center');text('2010',tx+tw*.69,1615,19,550,'#73859E','center');text('2026',tx+tw,1615,19,650,'#9FC5E1','right');
 // 방금 등장한 노선과 누적 수
 if(latest){roundRect(52,1657,976,104,24);g.fillStyle='rgba(15,27,45,.88)';g.fill();g.fillStyle=latest.color;g.fillRect(52,1657,9,104);text(`${latest.year}`,84,1700,22,700,latest.color);text(latest.name,84,1740,37,750,'#F5F8FC');text(`${shown}개 노선`,997,1730,25,600,'#A8B8CB','right')}
 // 범례와 데이터 고지
 g.beginPath();g.arc(64,1813,5,0,7);g.fillStyle='#fff';g.fill();text('일반역',80,1821,18,500,'#899BB1');g.beginPath();g.arc(195,1813,8,0,7);g.fillStyle='#07111F';g.fill();g.strokeStyle='#fff';g.lineWidth=2;g.stroke();text('환승역',212,1821,18,500,'#899BB1');text('실선: 해당 연도까지 개통 · 흐린 선: 완성 노선망 가이드',54,1864,18,500,'#667A93');text('OSM 기반 지리형 네트워크 · 2026 기준',1026,1864,18,500,'#667A93','right');
 window.__mg={t:+t.toFixed(3),year:iy,lines_shown:shown};
}
function frame(now){if(start===null)start=now;let t=Math.min(15,(now-start)/1000);draw(t);if(t<15)requestAnimationFrame(frame);else done=true}
function fit(){let s=Math.min(innerWidth/1080,innerHeight/1920);document.getElementById('stage').style.transform=`translate(-50%,-50%) scale(${s})`}
addEventListener('resize',fit);fit();window.__mg={t:0,year:1974,lines_shown:0};window.__mg_seek=(t)=>{draw(clamp(t,0,15));return window.__mg};document.fonts.ready.then(()=>requestAnimationFrame(frame));
</script></body></html>
